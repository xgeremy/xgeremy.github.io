<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — XGEREMY™</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/cFOFY4I.png">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background:#050505; color:#f5f5f7;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      text-align:center; padding:40px 20px;
      -webkit-font-smoothing:antialiased;
    }
    .container { max-width:480px; }
    .icon { font-size:64px; margin-bottom:24px; display:block; opacity:.6; }
    h1 {
      font-size:32px; font-weight:700; letter-spacing:-.02em; margin-bottom:12px;
      background:linear-gradient(135deg,#f5f5f7 0%,#86868b 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    p { font-size:17px; color:#86868b; line-height:1.6; margin-bottom:32px; font-weight:300; }
    a {
      display:inline-block; padding:13px 28px;
      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);
      border-radius:14px; color:#f5f5f7; text-decoration:none;
      font-size:15px; font-weight:500; letter-spacing:-.01em;
      backdrop-filter:blur(20px);
      transition:all .3s;
    }
    a:hover { border-color:rgba(255,255,255,.25); transform:translateY(-2px); }
    .logo-text {
      font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      color:#86868b; margin-bottom:40px; display:block;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="logo-text">XGEREMY™</span>
    <span class="icon">📡</span>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes internet en este momento. La página guardada puede estar disponible igual.</p>
    <a href="/">← Intentar de nuevo</a>
  </div>
</body>
</html>
